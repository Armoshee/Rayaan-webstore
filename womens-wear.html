<!DOCTYPE html>
<html>
<head>
  <title>Women's Wear Collection</title>
  <link rel="icon" type="image/png" href="logo.png">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 20px;
    }
    .section {
      background: white;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
      padding: 24px;
      margin-bottom: 24px;
      max-width: 1000px;
      margin-left: auto;
      margin-right: auto;
    }
    .section h2 {
      margin-top: 0;
      color: #1f8a70;
    }
    .product {
  display: flex;
  align-items: flex-start;
  gap: 20px;   /* space between image and details */
}
.product-image img {
  width: 150px;
  height: 250px;
  object-fit: cover;
}
.product-details {
  flex: 1;   /* take remaining space */
}

    .color-btn {
      padding: 8px 12px;
      margin: 5px 6px 5px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: white;
      cursor: pointer;
      transition: border-color 0.25s ease, background-color 0.25s ease;
    }
    .color-btn:hover {
      border-color: #1f8a70;
      background: #f0faf9;
    }
    .color-btn.selected {
      border: 2px solid #1f8a70;
      background-color: #e0f4f1;
    }
    .btn {
      padding: 10px 18px;
      margin: 10px 12px 0 0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #1f8a70;
      color: white;
      font-weight: bold;
      transition: background-color 0.25s ease, transform 0.15s ease;
    }
    .btn:hover {
      background-color: #166957;
      transform: translateY(-1px);
    }
    .footer {
      text-align: center;
      padding: 18px 0;
      color: #777;
    }
  </style>
</head>
<body>

  <!-- Saree Section -->
  <section class="section">
    <h2>Elegant Women's Sarees</h2>
    <div class="product-image">
      <img id="sareeImage" src="public/images/saree-cream.jpg" alt="Women Saree">
    </div>

    <p><strong>Price:</strong> ₹699</p>
    <p><strong>Delivery:</strong> Free Delivery | 10 Days Return</p>

    <div class="colors saree-colors">
      <label>Available Colors:</label><br>
      <button type="button" class="color-btn selected" onclick="selectSareeColor(this,'Cream','public/images/saree-cream.jpg')">Cream</button>
      <button type="button" class="color-btn" onclick="selectSareeColor(this,'Magenta','public/images/saree-megenta.jpg')">Magenta</button>
      <button type="button" class="color-btn" onclick="selectSareeColor(this,'Peach','public/images/saree.jpg')">Peach</button>
      <button type="button" class="color-btn" onclick="selectSareeColor(this,'Red','public/images/saree-red.jpg')">Red</button>
    </div>

    <button type="button" class="btn" onclick="addSelectedSareeToCart()">Add to Cart</button>
    <button type="button" class="btn" onclick="openCart()">Go to Cart</button>
  </section>

  <!-- Kurta Section -->
  <section class="section">
    <h2>Anni Designer Pure Cotton Maroon Kurta Pant Set with Dupatta for Women</h2>
    <div class="product-image">
      <img id="kurtaImage" src="public/images/womens-ethicks-wear.jpg" alt="Kurta Pant Set">
    </div>

    <p><span style="text-decoration:line-through;">₹1,199</span> <strong>₹599</strong> (50% off)</p>
    <p>Free Delivery | 10 Days Return & Exchange | Pay on Delivery</p>

    <div class="colors kurta-colors">
      <label>Available Colors:</label><br>
      <button class="color-btn selected" onclick="selectKurtaColor(this, 'Meroon', 'womens-ethicks-wear.jpg')">Meroon</button>
      <button class="color-btn" onclick="selectKurtaColor(this, 'Blue', 'womens-ethicks-wear1.jpg')">Blue</button>
      <button class="color-btn" onclick="selectKurtaColor(this, 'Green', 'womens-ethicks-wear2.jpg')">Green</button>
      <button class="color-btn" onclick="selectKurtaColor(this, 'Wine', 'womens-ethicks-wear5.jpg')">Wine</button>
    </div>

    <div class="sizes">
      <label for="kurtaSizeSelect">Size:</label>
      <select id="kurtaSizeSelect">
        <option value="XS">XS</option>
        <option value="S">S</option>
        <option value="M">M</option>
        <option value="L" selected>L</option>
        <option value="XL">XL</option>
        <option value="2XL">2XL</option>
      </select>
    </div>

    <button class="btn" onclick="addSelectedKurtaToCart()">Add to Cart</button>
    <button class="btn" onclick="openCart()">Go to Cart</button>
  </section>

  <footer class="footer">
    <p>&copy; 2026 E-commerce Website. All rights reserved.</p>
  </footer>

  <script>
    // Saree Logic
    let selectedSareeColor = 'Cream';
    let selectedSareeImage = 'saree-cream.jpg';

    function selectSareeColor(button, color, imageUrl) {
      selectedSareeColor = color;
      selectedSareeImage = imageUrl;
      document.getElementById('sareeImage').src = imageUrl;
      document.querySelectorAll('.saree-colors .color-btn').forEach(btn => btn.classList.remove('selected'));
      button.classList.add('selected');
    }

    function addSelectedSareeToCart() {
      const productName = `Elegant Women's Saree - ${selectedSareeColor}`;
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let existing = cart.find(item => item.name === productName);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ name: productName, price: 699, image: selectedSareeImage, quantity: 1 });
      }
      localStorage.setItem("cart", JSON.stringify(cart));
      alert(`${productName} added to cart!`);
    }

    // Kurta Logic
    let selectedKurtaColor = 'Meroon';
    let selectedKurtaImage = 'womens-ethicks-wear.jpg';

    function selectKurtaColor(button, color, imageUrl) {
      selectedKurtaColor = color;
      selectedKurtaImage = imageUrl;
      document.getElementById('kurtaImage').src = imageUrl;
      document.querySelectorAll('.kurta-colors .color-btn').forEach(btn => btn.classList.remove('selected'));
      button.classList.add('selected');
    }

    function addSelectedKurtaToCart() {
      const size = document.getElementById('kurtaSizeSelect').value;
      const productName = `Kurta Pant Set - ${selectedKurtaColor} - Size ${size}`;
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let existing = cart.find(item => item.name === productName);
      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({ name: productName, price: 599, image: selectedKurtaImage, quantity: 1 });
      }
      localStorage.setItem("cart", JSON.stringify(cart));
      alert(`${productName} added to cart!`);
    }

    // Common Cart Redirect
    function openCart() {
      window.location.href = "cart.html";
    }
  </script>
</body>
</html>
