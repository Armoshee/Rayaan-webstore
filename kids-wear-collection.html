<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kids Wear Collection</title>
  <link rel="icon" type="image/png" href="public/images/logo.png">
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f9f9f9; }
    .product {
      border: 1px solid #ccc;
      border-radius: 12px;
      padding: 20px;
      width: 720px;
      max-width: 100%;
      margin: 20px auto;
      background: white;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
    }
    .image-gallery {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 14px;
      margin-bottom: 12px;
      align-items: stretch;
    }
    .image-box {
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 8px;
      background: #fff;
      overflow: hidden;
      min-height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .image-gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      background: #eee;
    }
    .thumbnail-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .thumbnail-row .thumb {
      width: calc(25% - 7.5px);
      height: 100px;
      object-fit: cover;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }
    .thumbnail-row .thumb:hover,
    .thumbnail-row .thumb.selected {
      border-color: #1f8a70;
      transform: translateY(-1px);
    }
    .color-btn {
      padding: 8px 12px;
      margin: 5px 5px 5px 0;
      border: 1px solid #ccc;
      background-color: white;
      cursor: pointer;
      border-radius: 8px;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }
    .color-btn:hover {
      border-color: #1f8a70;
      background-color: #f0faf9;
    }
    .color-btn.selected {
      border: 2px solid #1f8a70;
      background-color: #e0f4f1;
    }
    .btn {
      padding: 10px 15px;
      margin: 8px 8px 0 0;
      border: none;
      cursor: pointer;
      background-color: #1f8a70;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      transition: background-color 0.2s ease, transform 0.15s ease;
    }
    .btn:hover {
      background-color: #166957;
      transform: translateY(-1px);
    }
    @media (max-width: 720px) {
      .image-gallery { grid-template-columns: 1fr; }
      .product { padding: 16px; }
    }
  </style>
</head>
<body>

  <h2>Kids Wear Collection</h2>

  <div class="product">
    <!-- Product image -->
    <div class="image-gallery">
      <div class="image-box">
        <img id="mainImage" src="public/images/kids-wear-red.jpg" alt="Kids T-Shirt main view">
      </div>
      <div class="image-box">
        <img id="secondaryImage" src="public/images/kids-wear-purple.jpg" alt="Kids T-Shirt alternate view">
        <img id="secondaryImage" src="public/images/kids-wear-green.jpg" alt="Kids T-Shirt alternate view">
        <img id="secondaryImage" src="public/images/kids-wear-blue.jpg" alt="Kids T-Shirt alternate view">
      </div>
    </div>
    <div class="thumbnail-row">
      <img class="thumb selected" src="public/images/kids-wear-red.jpg" alt="Red kids t-shirt" onclick="setMainImage(this)">
      <img class="thumb" src="public/images/kids-wear-purple.jpg" alt="Purple kids t-shirt" onclick="setMainImage(this)">
      <img class="thumb" src="public/images/kids-wear-green.jpg" alt="Green kids t-shirt" onclick="setMainImage(this)">
      <img class="thumb" src="public/images/kids-wear-blue.jpg" alt="Blue kids t-shirt" onclick="setMainImage(this)">
    </div>

    <!-- Product details -->
    <h3>Trendy Kids collection</h3>
    <p><span style="text-decoration:line-through;">₹499</span> <strong>₹299</strong> (40% off)</p>
    <p>Free Delivery | 7 Days Return</p>

    <!-- Color options -->
    <div class="colors">
      <label>Available Colors:</label><br>
      <button class="color-btn" onclick="selectColor(this, 'Red', 'public/images/kids-wear-red.jpg')">Red</button>
      <button class="color-btn" onclick="selectColor(this, 'Blue', 'public/images/kids-wear-purple.jpg')">Purple</button>
      <button class="color-btn" onclick="selectColor(this, 'Yellow', 'public/images/kids-wear-green.jpg')">Green</button>
      <button class="color-btn" onclick="selectColor(this, 'Green', 'public/images/kids-wear-blue.jpg')">Blue</button>
    </div>

    <!-- Size options -->
    <div class="sizes">
      <label>Size:</label>
      <select id="sizeSelect">
        <option value="2-4Y">2-4 Years</option>
        <option value="5-7Y">5-7 Years</option>
        <option value="8-10Y">8-10 Years</option>
        <option value="11-13Y">11-13 Years</option>
      </select>
    </div>

    <!-- Action buttons -->
    <button class="btn" onclick="addSelectedToCart()">Add to Cart</button>
    <button class="btn" onclick="goToCart()">Go to Cart</button>
  </div>

<script>
  let selectedColor = "Red";
  let selectedImage = "public/images/kids-wear-red.jpg";

  function selectColor(button, color, imageUrl) {
    selectedColor = color;
    selectedImage = imageUrl;
    document.getElementById("mainImage").src = imageUrl;
    updateThumbnailSelection(imageUrl);

    // Highlight selected button
    document.querySelectorAll(".color-btn").forEach(btn => btn.classList.remove("selected"));
    button.classList.add("selected");
  }

  function setMainImage(imageElement) {
    const imageUrl = imageElement.src;
    document.getElementById("mainImage").src = imageUrl;
    document.querySelectorAll(".thumb").forEach(thumb => thumb.classList.remove("selected"));
    imageElement.classList.add("selected");
  }

  function updateThumbnailSelection(imageUrl) {
    document.querySelectorAll(".thumb").forEach(thumb => {
      thumb.classList.toggle("selected", thumb.src.endsWith(imageUrl));
    });
  }

  function addSelectedToCart() {
    const size = document.getElementById("sizeSelect").value;
    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let productName = `Kids T-Shirt - ${selectedColor} - Size ${size}`;
    let existing = cart.find(item => item.name === productName);

    if (existing) {
      existing.quantity += 1;
    } else {
      cart.push({ name: productName, price: 299, image: selectedImage, quantity: 1 });
    }

    localStorage.setItem("cart", JSON.stringify(cart));
    alert(`${productName} added to cart!`);
  }

  function goToCart() {
    window.location.href = "cart.html";
  }
</script>

</body>
</html>
